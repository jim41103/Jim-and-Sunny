<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美珊與野狼的碩班之旅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif TC', 'Georgia', serif;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('assets/background.jpg') center/cover no-repeat;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg,
        rgba(15, 25, 45, 0.62) 0%,
        rgba(30, 50, 70, 0.48) 50%,
        rgba(15, 25, 45, 0.55) 100%
      );
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 28px;
      padding: 64px 84px;
      text-align: center;
      color: #fff;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35),
                  inset 0 1px 0 rgba(255,255,255,0.22);
      max-width: 540px;
      width: 90%;
    }

    .pre-title {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.72;
      margin-bottom: 18px;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: rgba(255,255,255,0.5);
      margin: 0 auto 22px;
    }

    h1 {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 10px;
      text-shadow: 0 2px 14px rgba(0,0,0,0.28);
    }

    .tagline {
      font-size: 13px;
      font-weight: 300;
      opacity: 0.68;
      letter-spacing: 2px;
      margin-bottom: 52px;
    }

    .btns {
      display: flex;
      gap: 22px;
      justify-content: center;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 26px 40px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.09);
      color: #fff;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 148px;
    }

    .btn:hover {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.85);
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 18px 36px rgba(0,0,0,0.22);
    }

    .btn-icon  { font-size: 38px; line-height: 1; }
    .btn-name  { font-size: 21px; font-weight: 600; letter-spacing: 2px; }
    .btn-sub   { font-size: 10px; letter-spacing: 2.5px; opacity: 0.68; }

    .footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.38);
      font-size: 11px;
      letter-spacing: 2px;
      z-index: 10;
    }

    @media (max-width: 480px) {
      .card { padding: 48px 32px; }
      h1 { font-size: 30px; }
      .btns { flex-direction: column; align-items: center; }
      .btn { width: 200px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="card">
    <p class="pre-title">2026 · Taipei · NTU<br>Stockholm · KI</p>
    <div class="divider"></div>
    <h1>美珊與野狼的<br>碩班之旅</h1>
    <p class="tagline">記錄每一個在北歐與台灣的足跡</p>
    <div class="btns">
      <a href="wolf/index.html" class="btn">
        <span class="btn-icon">🐺</span>
        <span class="btn-name">野 狼</span>
        <span class="btn-sub">Jim's Diary</span>
      </a>
      <a href="meishan/index.html" class="btn">
        <span class="btn-icon">☀️</span>
        <span class="btn-name">美 珊</span>
        <span class="btn-sub">Sunny's Diary</span>
      </a>
    </div>
  </div>

  <div class="footer">2026 — 在異鄉的每一天都值得被記住</div>
</body>
</html>
