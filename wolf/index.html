<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐺 野狼的日記</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:       #1a3a5c;
      --primary-light: #2d5a8e;
      --accent:        #4a90e2;
      --accent-light:  #7ab3eb;
      --bg:            #f0f4f8;
      --card:          #ffffff;
      --text:          #1a2332;
      --muted:         #6b7a8d;
      --border:        #e2e8f0;
      --shadow:        0 4px 18px rgba(26,58,92,0.08);
      --radius:        16px;
      --radius-sm:     10px;
    }

    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 0 28px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 14px rgba(0,0,0,0.18);
    }
    .h-left { display: flex; align-items: center; gap: 11px; font-family: 'Noto Serif TC', serif; }
    .h-title { font-size: 19px; font-weight: 700; letter-spacing: 1px; }
    .h-right { display: flex; align-items: center; gap: 14px; }
    .weather-pill {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 24px;
      padding: 5px 14px;
      font-size: 13px;
      display: flex; align-items: center; gap: 5px;
    }
    .nav-btn {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 8px;
      padding: 6px 13px;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-family: 'Noto Serif TC', serif;
      transition: background .2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.26); }

    /* ── Layout ── */
    .main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 26px 22px;
      display: grid;
      grid-template-columns: 1fr 370px;
      gap: 22px;
      align-items: start;
    }
    .left-col  { display: flex; flex-direction: column; gap: 14px; }
    .right-col { display: flex; flex-direction: column; gap: 14px; }

    /* ── Search & Toolbar ── */
    .search-wrap {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 18px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: var(--shadow);
    }
    .search-wrap input {
      border: none; outline: none;
      font-size: 14px; width: 100%;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--text);
      background: transparent;
    }
    .search-wrap input::placeholder { color: var(--muted); }

    .toolbar { display: flex; align-items: center; justify-content: space-between; }
    .toolbar-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 600; color: var(--primary); }

    .btn-new {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: all .2s;
    }
    .btn-new:hover { background: var(--primary-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,144,226,.4); }

    /* ── Diary Cards ── */
    .diary-list { display: flex; flex-direction: column; gap: 11px; }

    .diary-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 22px;
      cursor: pointer;
      transition: all .2s;
      border: 1.5px solid transparent;
      box-shadow: var(--shadow);
    }
    .diary-card:hover { border-color: var(--accent-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(74,144,226,.12); }

    .c-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
    .c-date {
      background: var(--bg);
      color: var(--muted);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px; font-weight: 500;
    }
    .c-mood { font-size: 22px; }
    .c-title { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 600; margin-bottom: 7px; }
    .c-preview {
      font-size: 13px; color: var(--muted); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .empty-state { text-align: center; padding: 56px 24px; color: var(--muted); }
    .empty-state .icon { font-size: 46px; margin-bottom: 14px; }
    .empty-state p { font-size: 14px; line-height: 1.7; }

    /* ── Widget ── */
    .widget { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
    .w-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px; font-weight: 600;
      color: var(--primary);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 7px;
    }

    /* ── Calendar ── */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-title-text { font-family: 'Noto Serif TC', serif; font-size: 14px; font-weight: 600; }
    .cal-arrow {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px; padding: 3px 8px; border-radius: 6px;
      transition: background .2s;
    }
    .cal-arrow:hover { background: var(--bg); color: var(--primary); }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-dh { text-align: center; font-size: 10px; font-weight: 600; color: var(--muted); padding: 3px 0 7px; }
    .cal-d {
      aspect-ratio: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      position: relative;
    }
    .cal-d:hover:not(.empty) { background: var(--bg); }
    .cal-d.today { background: var(--accent); color: #fff; font-weight: 700; }
    .cal-d.selected:not(.today) { background: rgba(74,144,226,.13); border: 1.5px solid var(--accent); font-weight: 600; }
    .cal-d.other-month { color: #c5ccd6; }
    .cal-d.empty { cursor: default; }
    .cal-d.has-event::after {
      content: '';
      position: absolute; bottom: 3px;
      width: 4px; height: 4px;
      border-radius: 50%; background: var(--accent);
    }
    .cal-d.today.has-event::after { background: #fff; }

    .ev-list { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
    .ev-date-label { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
    .ev-item { display: flex; align-items: flex-start; gap: 9px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .ev-item:last-child { border-bottom: none; }
    .ev-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .ev-info { flex: 1; }
    .ev-title { font-size: 13px; font-weight: 500; }
    .ev-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .ev-del { background: none; border: none; cursor: pointer; color: #c5ccd6; font-size: 13px; padding: 2px 5px; transition: color .2s; }
    .ev-del:hover { color: #e53e3e; }

    .btn-add-ev {
      width: 100%; margin-top: 10px; padding: 8px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm); background: none;
      color: var(--muted); font-size: 13px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; transition: all .2s;
    }
    .btn-add-ev:hover { border-color: var(--accent); color: var(--accent); background: rgba(74,144,226,.04); }

    /* ── Weather ── */
    .weather-wrap { display: flex; align-items: center; gap: 14px; }
    .w-icon-lg { font-size: 46px; }
    .w-info { flex: 1; }
    .w-temp { font-size: 30px; font-weight: 700; color: var(--primary); line-height: 1; }
    .w-label { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .w-details { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.6; }
    .w-loc { font-size: 10px; color: var(--accent); margin-top: 4px; font-weight: 600; letter-spacing: 1px; }

    /* ── Q&A ── */
    .qa-q {
      font-family: 'Noto Serif TC', serif;
      font-size: 14px; font-weight: 600; line-height: 1.55;
      padding: 11px 14px;
      background: linear-gradient(135deg, var(--bg), rgba(74,144,226,.06));
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--accent);
      margin-bottom: 13px;
    }
    .qa-section { margin-bottom: 11px; }
    .qa-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .qa-input {
      width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: 9px 12px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
      resize: none; outline: none; transition: border-color .2s; min-height: 68px; line-height: 1.6;
      color: var(--text);
    }
    .qa-input:focus { border-color: var(--accent); }
    .qa-partner {
      background: var(--bg); border-radius: var(--radius-sm);
      padding: 9px 12px; font-size: 13px; color: var(--text); line-height: 1.6; min-height: 38px;
    }
    .btn-save-qa {
      width: 100%; margin-top: 9px;
      background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius-sm);
      padding: 10px; font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer; transition: all .2s;
    }
    .btn-save-qa:hover { background: var(--primary-light); }

    /* ── Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.48); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 20px;
      width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,.25);
      animation: mIn .24s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-sm { max-width: 460px; }
    @keyframes mIn { from { opacity:0; transform: scale(.92) translateY(14px); } to { opacity:1; transform: scale(1) translateY(0); } }

    .m-head { padding: 22px 26px 0; display: flex; align-items: center; justify-content: space-between; }
    .m-title { font-family: 'Noto Serif TC', serif; font-size: 19px; font-weight: 700; color: var(--primary); }
    .m-close { background: var(--bg); border: none; border-radius: 7px; width: 30px; height: 30px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all .2s; }
    .m-close:hover { background: #fee2e2; color: #e53e3e; }
    .m-body { padding: 22px 26px; }
    .m-foot { padding: 0 26px 26px; display: flex; gap: 10px; justify-content: flex-end; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 7px; letter-spacing: .5px; }
    .form-input, .form-textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: 9px 13px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
      outline: none; transition: border-color .2s; color: var(--text);
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 175px; line-height: 1.75; }

    .mood-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .mood-opt {
      background: var(--bg); border: 2px solid transparent; border-radius: 9px;
      padding: 7px 12px; cursor: pointer; font-size: 17px;
      transition: all .15s; display: flex; align-items: center; gap: 5px;
    }
    .mood-opt span { font-size: 11px; color: var(--muted); }
    .mood-opt:hover { background: rgba(74,144,226,.08); border-color: var(--accent-light); }
    .mood-opt.sel { border-color: var(--accent); background: rgba(74,144,226,.08); }

    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-opt { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all .15s; }
    .color-circle { width: 26px; height: 26px; border-radius: 50%; border: 3px solid transparent; transition: all .15s; }
    .color-opt.sel .color-circle { border-color: var(--text); transform: scale(1.12); }
    .color-label { font-size: 10px; color: var(--muted); font-weight: 500; }
    .color-opt.sel .color-label { color: var(--text); font-weight: 700; }
    .converted-time { background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 13px; font-size: 14px; color: var(--primary); font-weight: 600; min-height: 40px; display: flex; align-items: center; }
    .photo-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .photo-thumb { position: relative; display: inline-block; }
    .photo-thumb img { width: 76px; height: 76px; object-fit: cover; border-radius: 8px; border: 1.5px solid var(--border); display: block; }
    .photo-thumb .rm-btn { position: absolute; top: -6px; right: -6px; background: #e53e3e; color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
    .view-photos { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .view-photos img { width: 100%; max-width: 240px; border-radius: 10px; cursor: pointer; border: 1.5px solid var(--border); }
    .clock-pill { background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.24); border-radius: 24px; padding: 5px 14px; font-size: 13px; display: flex; align-items: center; gap: 5px; }

    .btn-cancel { background: var(--bg); color: var(--muted); border: none; border-radius: var(--radius-sm); padding: 9px 18px; font-size: 14px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all .2s; }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-submit { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 9px 22px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; transition: all .2s; }
    .btn-submit:hover { background: var(--primary-light); }
    .btn-del { background: #fee2e2; color: #e53e3e; border: none; border-radius: var(--radius-sm); padding: 9px 18px; font-size: 14px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all .2s; }
    .btn-del:hover { background: #fecaca; }

    /* View modal */
    .ev-head-row { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
    .ev-date-badge { background: var(--bg); border-radius: 6px; padding: 4px 11px; font-size: 13px; color: var(--muted); font-weight: 500; }
    .ev-mood-badge { font-size: 24px; }
    .ev-content { font-size: 15px; line-height: 1.82; color: var(--text); white-space: pre-wrap; font-family: 'Noto Serif TC', serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a0aec0; }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .header { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="h-left" style="cursor:pointer" onclick="location.reload()">
    <span style="font-size:23px">🐺</span>
    <span class="h-title">野狼的日記</span>
  </div>
  <div class="h-right">
    <div class="weather-pill">
      <span id="hWeatherIcon">🌤️</span>
      <span id="hWeatherTemp">載入中...</span>
    </div>
    <div class="clock-pill">🕐 <span id="hClock">--:--</span>&nbsp;台北</div>
    <a href="../index.html" class="nav-btn">🏠 首頁</a>
    <a href="../meishan/index.html" class="nav-btn">☀️ 美珊</a>
  </div>
</header>

<!-- ── Main ── -->
<div class="main">

  <!-- Left: Diary -->
  <div class="left-col">
    <div class="search-wrap">
      <span style="font-size:17px;color:#a0aec0">🔍</span>
      <input type="text" id="searchInput" placeholder="搜尋日記標題或內容...">
    </div>
    <div class="toolbar">
      <h2 class="toolbar-title">📖 日記列表</h2>
      <button class="btn-new" onclick="openNewEntry()">＋ 新增日記</button>
    </div>
    <div class="diary-list" id="diaryList">
      <div class="empty-state"><div class="icon">📓</div><p>還沒有日記<br>記錄下在瑞典的第一天吧！</p></div>
    </div>
  </div>

  <!-- Right: Widgets -->
  <div class="right-col">

    <!-- Calendar -->
    <div class="widget">
      <div class="w-title">📅 共同行事曆</div>
      <div class="cal-nav">
        <button class="cal-arrow" onclick="prevMonth()">‹</button>
        <span class="cal-title-text" id="calTitle"></span>
        <button class="cal-arrow" onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="ev-list" id="evList"></div>
      <button class="btn-add-ev" onclick="openNewEvent()">＋ 新增行程</button>
    </div>

    <!-- Weather -->
    <div class="widget">
      <div class="w-title">🌤️ 台北天氣</div>
      <div class="weather-wrap">
        <div class="w-icon-lg" id="wIcon">⏳</div>
        <div class="w-info">
          <div class="w-temp" id="wTemp">--°C</div>
          <div class="w-label" id="wLabel">載入中...</div>
          <div class="w-details" id="wDetails"></div>
          <div class="w-loc">TAIPEI · TW</div>
        </div>
      </div>
    </div>

    <!-- Daily Q&A -->
    <div class="widget">
      <div class="w-title">❓ 每日問答</div>
      <div class="qa-q" id="qaQ"></div>
      <div class="qa-section">
        <div class="qa-label">🐺 我的回答</div>
        <textarea class="qa-input" id="myAnswer" placeholder="寫下今天的回答..."></textarea>
      </div>
      <div class="qa-section">
        <div class="qa-label">🌸 美珊說</div>
        <div class="qa-partner" id="partnerAnswer"><span style="color:#a0aec0;font-style:italic">等待美珊回答...</span></div>
      </div>
      <button class="btn-save-qa" onclick="saveQA()">儲存回答</button>
    </div>

  </div>
</div>

<!-- ── Modal: New/Edit Entry ── -->
<div class="overlay" id="entryModal">
  <div class="modal">
    <div class="m-head">
      <h3 class="m-title" id="entryModalTitle">新增日記</h3>
      <button class="m-close" onclick="closeModal('entryModal')">✕</button>
    </div>
    <div class="m-body">
      <div class="form-group">
        <label class="form-label">標題</label>
        <input type="text" class="form-input" id="eTitle" placeholder="今天的標題...">
      </div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input type="date" class="form-input" id="eDate">
      </div>
      <div class="form-group">
        <label class="form-label">心情</label>
        <div class="mood-picker" id="moodPicker">
          <div class="mood-opt sel" data-mood="😊" onclick="pickMood(this)">😊 <span>快樂</span></div>
          <div class="mood-opt" data-mood="😍" onclick="pickMood(this)">😍 <span>開心</span></div>
          <div class="mood-opt" data-mood="😌" onclick="pickMood(this)">😌 <span>平靜</span></div>
          <div class="mood-opt" data-mood="🤔" onclick="pickMood(this)">🤔 <span>思考</span></div>
          <div class="mood-opt" data-mood="😴" onclick="pickMood(this)">😴 <span>疲倦</span></div>
          <div class="mood-opt" data-mood="😢" onclick="pickMood(this)">😢 <span>想家</span></div>
          <div class="mood-opt" data-mood="🥰" onclick="pickMood(this)">🥰 <span>戀愛</span></div>
          <div class="mood-opt" data-mood="🎉" onclick="pickMood(this)">🎉 <span>慶祝</span></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">內容</label>
        <textarea class="form-textarea" id="eContent" placeholder="寫下今天的故事..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">插入照片（選填，可多張）</label>
        <input type="file" id="ePhotos" accept="image/*" multiple class="form-input" style="padding:6px;cursor:pointer">
        <div class="photo-preview" id="photoPreview"></div>
      </div>
    </div>

// ── 時區工具 ──
function tzOffsetMin(tz, date) {
  const fmt = (z) => new Intl.DateTimeFormat('en-US', {
    timeZone: z, year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false
  }).format(date).replace(/(\d+)\/(\d+)\/(\d+),\s(\d+):(\d+):(\d+)/, '$3-$1-$2T$4:$5:$6Z');
  const utcMs = new Date(fmt('UTC')).getTime();
  const tzMs  = new Date(fmt(tz)).getTime();
  return Math.round((tzMs - utcMs) / 60000);
}
function convertTime(dateStr, timeStr, fromTZ, toTZ) {
  if (!timeStr || !dateStr) return '—';
  const [y,m,d] = dateStr.split('-').map(Number);
  const [h,min] = timeStr.split(':').map(Number);
  const ref = new Date(Date.UTC(y, m-1, d, h, min));
  const fromOff = tzOffsetMin(fromTZ, ref);
  const toOff   = tzOffsetMin(toTZ,   ref);
  const total = ((h*60 + min - fromOff + toOff) % 1440 + 1440) % 1440;
  return String(Math.floor(total/60)).padStart(2,'0') + ':' + String(total%60).padStart(2,'0');
}
function updateConvertedTime() {
  const t = document.getElementById('evTime').value;
  const d = document.getElementById('evDate').value || today();
  document.getElementById('convertedTime').textContent =
    t ? convertTime(d, t, 'Europe/Stockholm', 'Asia/Taipei') : '—';
}

// ── 照片壓縮 ──
function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1100;
        let w = img.width, h = img.height;
        if (w > h && w > MAX) { h = Math.round(h*MAX/w); w = MAX; }
        else if (h > MAX) { w = Math.round(w*MAX/h); h = MAX; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', 0.72));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const WDAYS  = ['日','一','二','三','四','五','六'];

function renderCal() {
  document.getElementById('calTitle').textContent = `${calY} 年 ${MONTHS[calM]}`;
  const first = new Date(calY, calM, 1).getDay();
  const days  = new Date(calY, calM+1, 0).getDate();
  const evDates = new Set(events.map(e => e.date));
  const td = today();

  let html = WDAYS.map(d => `<div class="cal-dh">${d}</div>`).join('');
  for (let i=0; i<first; i++) html += '<div class="cal-d empty"></div>';
  for (let d=1; d<=days; d++) {
    const ds = `${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = [
      'cal-d',
      ds===td ? 'today' : '',
      ds===selDate && ds!==td ? 'selected' : '',
      evDates.has(ds) ? 'has-event' : '',
    ].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="pickDate('${ds}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

function pickDate(ds) { selDate = ds; renderCal(); renderEvents(ds); }
function prevMonth() { calM--; if (calM<0){calM=11;calY--;} renderCal(); }

function renderEvents(ds) {

  updateClock();
  setInterval(updateClock, 1000);
  document.getElementById('ePhotos').addEventListener('change', async (e) => {
    for (const file of Array.from(e.target.files)) {
      selectedPhotos.push(await compressImage(file));
    }
    e.target.value = '';
    renderPhotoPreview();
  });
  document.getElementById('evDate').addEventListener('change', updateConvertedTime);

  if (firebaseConfig.apiKey === 'YOUR_API_KEY') {
    document.body.insertAdjacentHTML('afterbegin',
      `<div style="background:#fff3cd;border-bottom:2px solid #ffc107;padding:11px 22px;font-size:13px;text-align:center;position:relative;z-index:9999">
        ⚠️ 請先完成 Firebase 設定！詳見 <strong>README.md</strong> 的步驟說明。
      </div>`);
  } else {
    initDB();
  }
});
</script>
</body>
</html>
